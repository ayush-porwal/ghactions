name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.12.0
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
